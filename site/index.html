<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>SplashParty (WebGPU)</title>
  <style>
    :root {
      --app-height: 100dvh;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101018;
      color: #e8e8f0;
      font-family: system-ui, sans-serif;
    }

    body {
      min-height: var(--app-height);
      position: relative;
      touch-action: none;
      overscroll-behavior: none;
    }

    #splashparty-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: var(--app-height);
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      align-items: center;
      justify-content: center;
      display: flex;
      pointer-events: none;
      flex-direction: column;
      gap: 0.5rem;
      text-align: center;
      padding:
        max(1rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
    }

    #overlay strong {
      color: #7ec8ff;
    }

    #orientation {
      opacity: 0.85;
      font-size: 0.92rem;
    }

    #load-panel {
      display: none;
      width: min(380px, 88vw);
      flex-direction: column;
      gap: 0.45rem;
      align-items: stretch;
      margin-top: 0.35rem;
    }

    #load-panel.visible {
      display: flex;
    }

    #load-panel .load-line {
      font-size: 0.88rem;
      opacity: 0.92;
      text-align: center;
    }

    #load-progress-track {
      height: 7px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    #load-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: linear-gradient(90deg, #4a9eff, #7ec8ff);
      transform-origin: left center;
      transition: width 0.15s ease-out;
    }

    #load-progress-track.indeterminate #load-progress-fill {
      width: 42%;
      animation: load-bar-slide 1.05s ease-in-out infinite;
    }

    @keyframes load-bar-slide {

      0%,
      100% {
        transform: translateX(-30%);
      }

      50% {
        transform: translateX(190%);
      }
    }
  </style>
</head>

<body>
  <canvas id="splashparty-canvas"></canvas>
  <div id="overlay">
    <div><strong>WebGPU</strong> builds only — use a recent Chromium / Firefox nightly if this fails.</div>
    <div>Touch: left side move · right-third fire · drag elsewhere to look</div>
    <div id="orientation"></div>
    <div id="status"></div>
    <div id="load-panel" aria-live="polite">
      <div id="load-line" class="load-line"></div>
      <div id="load-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="load-progress-fill"></div>
      </div>
    </div>
  </div>
  <script type="module">
    const status = document.getElementById("status");
    const orientation = document.getElementById("orientation");
    const loadPanel = document.getElementById("load-panel");
    const loadLine = document.getElementById("load-line");
    const loadTrack = document.getElementById("load-progress-track");
    const loadFill = document.getElementById("load-progress-fill");
    const hasWebGpu = "gpu" in navigator;

    /** Console ring buffer for agents / `npm run capture-console` (Playwright reads via evaluate). */
    (function installConsoleTap() {
      const MAX = 400;
      const tap = [];
      const stringify = (x) => {
        if (x === null || x === undefined) return String(x);
        if (typeof x === "string") return x;
        if (typeof x === "number" || typeof x === "boolean" || typeof x === "bigint") return String(x);
        if (x instanceof Error) return x.stack || x.message;
        try {
          return JSON.stringify(x);
        } catch {
          return String(x);
        }
      };
      const record = (level, args) => {
        tap.push({ t: Math.round(performance.now()), level, text: args.map(stringify).join(" ") });
        if (tap.length > MAX) tap.splice(0, tap.length - MAX);
        window.__SPLASHPARTY_CONSOLE__ = tap;
      };
      for (const level of ["log", "info", "warn", "error", "debug"]) {
        const orig = console[level].bind(console);
        console[level] = (...args) => {
          try {
            record(level, args);
          } catch {
            /* ignore */
          }
          orig(...args);
        };
      }
    })();

    /** Boot diagnostics: live in DevTools Console + `window.__SPLASHPARTY_BOOT__` (last 200). */
    const BOOT_TAG = "[SplashParty boot]";
    const BOOT_MAX = 200;
    const bootEntries = [];
    const bootLog = (phase, detail) => {
      const entry = {
        t: Math.round(performance.now()),
        phase,
        detail: detail === undefined ? null : detail,
      };
      bootEntries.push(entry);
      if (bootEntries.length > BOOT_MAX) bootEntries.splice(0, bootEntries.length - BOOT_MAX);
      window.__SPLASHPARTY_BOOT__ = bootEntries;
      const suffix =
        detail !== undefined && detail !== null && detail !== ""
          ? typeof detail === "string"
            ? ` ${detail}`
            : ` ${JSON.stringify(detail)}`
          : "";
      console.info(BOOT_TAG, `${entry.t}ms`, phase + suffix);
    };

    bootLog("script module evaluating");
    window.addEventListener(
      "error",
      (ev) => {
        console.error(BOOT_TAG, "window error", ev.message, ev.error ?? ev.filename, ev.lineno, ev.colno);
      },
      { capture: true },
    );
    window.addEventListener("unhandledrejection", (ev) => {
      const r = ev.reason;
      console.error(BOOT_TAG, "unhandledrejection", r);
    });

    const syncViewport = () => {
      const viewportHeight = Math.round(window.visualViewport?.height ?? window.innerHeight);
      document.documentElement.style.setProperty("--app-height", `${Math.max(viewportHeight, 1)}px`);
    };

    const syncOrientation = () => {
      const portrait = window.matchMedia("(orientation: portrait)").matches;
      orientation.textContent = `Screen: ${portrait ? "portrait" : "landscape"}`;
    };

    const onViewportChanged = () => {
      syncViewport();
      syncOrientation();
    };

    onViewportChanged();
    window.addEventListener("resize", onViewportChanged, { passive: true });
    window.addEventListener("orientationchange", onViewportChanged, { passive: true });
    window.visualViewport?.addEventListener("resize", onViewportChanged, { passive: true });

    if (!hasWebGpu) {
      status.textContent = "navigator.gpu is missing — update your browser.";
      bootLog("WebGPU missing", "navigator.gpu absent");
    } else {
      status.textContent = "";
      bootLog("WebGPU present", "navigator.gpu OK");
    }

    const setLoadProgress = (ratio, indeterminate) => {
      loadTrack.classList.toggle("indeterminate", Boolean(indeterminate));
      if (indeterminate) {
        loadFill.style.width = "";
        loadTrack.removeAttribute("aria-valuenow");
        return;
      }
      const pct = Math.max(0, Math.min(100, Math.round(Number(ratio) * 100)));
      loadFill.style.width = `${pct}%`;
      loadTrack.setAttribute("aria-valuenow", String(pct));
    };

    const showLoadPanel = (message) => {
      loadLine.textContent = message;
      loadPanel.classList.add("visible");
    };

    const hideLoadPanel = () => {
      loadPanel.classList.remove("visible");
      loadTrack.classList.remove("indeterminate");
      loadFill.style.width = "0%";
      loadTrack.setAttribute("aria-valuenow", "0");
    };

    async function fetchWasmArrayBuffer(url, onProgress) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`WASM 请求失败：HTTP ${res.status}`);
      const total = Number(res.headers.get("Content-Length") || 0) || 0;
      const reader = res.body?.getReader();
      if (!reader) {
        const buf = await res.arrayBuffer();
        onProgress(1, { received: buf.byteLength, total: buf.byteLength, knownTotal: true });
        return buf;
      }
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.byteLength;
        if (total > 0) onProgress(Math.min(1, received / total), { received, total, knownTotal: true });
        else onProgress(-1, { received, total: 0, knownTotal: false });
      }
      const out = new Uint8Array(received);
      let offset = 0;
      for (const c of chunks) {
        out.set(c, offset);
        offset += c.byteLength;
      }
      onProgress(1, { received, total: total > 0 ? total : received, knownTotal: total > 0 });
      return out.buffer;
    }

    (function installMappedAtCreationFallback() {
      const params = new URLSearchParams(window.location.search);
      const forceFallback = params.has("splashparty-force-buffer-shim");
      const proto = window.GPUDevice?.prototype;
      if (!proto?.createBuffer || proto.__splashpartyMappedAtCreationFallback) {
        return;
      }

      const isMappedAtCreationRangeError = (e) =>
        e instanceof RangeError &&
        String(e.message || "").includes("mappedAtCreation") &&
        String(e.message || "").includes("too large");

      const originalCreateBuffer = proto.createBuffer;
      Object.defineProperty(proto, "__splashpartyMappedAtCreationFallback", {
        value: true,
      });
      proto.createBuffer = function createBufferWithMappedAtCreationFallback(desc) {
        if (!desc?.mappedAtCreation) {
          return originalCreateBuffer.call(this, desc);
        }

        try {
          if (!forceFallback) {
            return originalCreateBuffer.call(this, desc);
          }
        } catch (e) {
          if (!isMappedAtCreationRangeError(e)) {
            throw e;
          }
          console.warn(BOOT_TAG, "mappedAtCreation fallback active", e.message);
        }

        const buffer = originalCreateBuffer.call(this, { ...desc, mappedAtCreation: false });
        const bytes = new ArrayBuffer(Number(desc.size || 0));
        const nativeGetMappedRange = buffer.getMappedRange?.bind(buffer);
        const nativeUnmap = buffer.unmap?.bind(buffer);
        let mapped = true;

        Object.defineProperty(buffer, "getMappedRange", {
          configurable: true,
          value(offset = 0, size) {
            if (!mapped) {
              throw new DOMException("Buffer is not mapped", "OperationError");
            }
            const start = Number(offset) || 0;
            const length = size === undefined ? bytes.byteLength - start : Number(size);
            if (start === 0 && length === bytes.byteLength) {
              return bytes;
            }
            return bytes.slice(start, start + length);
          },
        });

        Object.defineProperty(buffer, "unmap", {
          configurable: true,
          value: function () {
            if (mapped) {
              this.queue.writeBuffer(buffer, 0, new Uint8Array(bytes));
              mapped = false;
              if (nativeGetMappedRange) {
                Object.defineProperty(buffer, "getMappedRange", {
                  configurable: true,
                  value: nativeGetMappedRange,
                });
              }
              if (nativeUnmap) {
                Object.defineProperty(buffer, "unmap", {
                  configurable: true,
                  value: nativeUnmap,
                });
              }
            }
          }.bind(this),
        });

        return buffer;
      };
    })();

    try {
      if (hasWebGpu) {
        showLoadPanel("正在加载启动脚本…");
        setLoadProgress(0, true);
      }
      bootLog("dynamic import start", "./dist/splashparty.js");
      const mod = await import("./dist/splashparty.js");
      bootLog("dynamic import ok", Object.keys(mod).join(",") || "(no exports)");

      if (hasWebGpu) {
        const wasmUrl = new URL("./dist/splashparty_bg.wasm", import.meta.url).href;
        bootLog("wasm fetch start", wasmUrl);
        loadLine.textContent = "正在下载 WASM…";
        setLoadProgress(0, true);
        const wasmBuf = await fetchWasmArrayBuffer(wasmUrl, (ratio, meta) => {
          if (meta.knownTotal && ratio >= 0 && ratio <= 1) {
            setLoadProgress(ratio, false);
            loadLine.textContent = `正在下载 WASM… ${Math.round(ratio * 100)}%`;
          } else {
            setLoadProgress(0, true);
            const mb = (meta.received / (1024 * 1024)).toFixed(1);
            loadLine.textContent = `正在下载 WASM… 已接收 ${mb} MB`;
          }
        });
        bootLog("wasm fetch ok", wasmBuf.byteLength);
        loadLine.textContent = "正在实例化 WebAssembly…（编译与启动）";
        setLoadProgress(1, false);
        bootLog("wasm default() start", "prefetched ArrayBuffer");
        await mod.default({ module_or_path: wasmBuf });
        bootLog("wasm default() returned");
      } else {
        bootLog("wasm default() start");
        await mod.default();
        bootLog("wasm default() returned");
      }
    } catch (e) {
      if (hasWebGpu) hideLoadPanel();
      console.error(BOOT_TAG, "bootstrap failed", e);
      bootLog("bootstrap FAILED", String(e));
      const msg = e && e.message ? String(e.message) : String(e);
      status.textContent = `Boot error — see Console (${BOOT_TAG})`;
      status.title = msg;
      throw e;
    }
    if (hasWebGpu) hideLoadPanel();
    status.textContent = "";
    bootLog("overlay status cleared", "ready");
  </script>
</body>

</html>
