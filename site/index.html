<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>SplashParty (WebGPU)</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #101018;
      color: #e8e8f0;
      font-family: system-ui, sans-serif;
    }

    #overlay {
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      display: flex;
      pointer-events: none;
      flex-direction: column;
      gap: 0.5rem;
      text-align: center;
      padding: 1rem;
    }

    #overlay strong {
      color: #7ec8ff;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div id="overlay">
    <div><strong>WebGPU</strong> builds only — use a recent Chromium / Firefox nightly if this fails.</div>
    <div>Touch: left side move · right-third fire · drag elsewhere to look</div>
    <div id="status"></div>
  </div>
  <script type="module">
    const status = document.getElementById("status");
    if (!("gpu" in navigator)) {
      status.textContent = "navigator.gpu is missing — update your browser.";
    } else {
      status.textContent = "Loading wasm…";
    }
    const mod = await import("./dist/splashparty.js");
    await mod.default();
    status.textContent = "";
  </script>
</body>

</html>
